<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lindomar Hamburguer</title>
    <link rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" 
    integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA=="
    crossorigin="anonymous" 
    referrerpolicy="no-referrer" /> 



    <link href="./styles/output.css" rel="stylesheet">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="w-full h-full flex flex-col justify-center items-center">
            <img 
                src="assets/hamb-1.png" 
                alt="Lindomar Hamburguer" 
                class="w-32 h-32 rounded-full shadow-lg hover:scale-110 duration-200"
            />

            <h1 class="text-4xl mt-4 mb-2 font-bold text-white">Lindomar do Sanduíche</h1>
            <span class="text-white"> Rua 61, Setor Joaquim da silva, Itapuranga-GO</span>

            <div class="bg-green-600 px-4 py-1 rounded-lg mt-5" id="date-span">
                <span class="text-white font-medium">
                    Ter á dom - 18:00 as 23:00 
                </span>
            
            </div>
        </div>
    </header>
    <!-- FIM DO HEADER -->

    <h2 class="text-2xl md:text-4xl font-bold mt-10 mb-6 text-center">
        Conheça nosso menu
    </h2>

    <!-- MENU -->
    <div id="menu">
        <main class="grid grid-cols-1">
            <!-- item -->
            <div class="flex gap-2">
                <img src="assets/hamb-1.png" 
                alt="Hamburguer 1"
                class="w-28 h-28 rounded-md hover:scale-110 hover:rotate-2 duration-300"
                />
                <div>
                    <p class="font-bold">X-Salada Especial</p>
                    <p class="text-sm">Hambúrguer, mussarela, tomate, presunto, alface, ovo, milho e batata palha</p>

                    <div class="flex items-center gap-4 justify-between mt-3">
                        <p class="font-bold text-lg">R$ 19,00</p>
                        <button class="bg-gray-700 px-5 rounded add-to-cart-btn">
                            <i class="fa fa-cart-plus text-lg text-white"></i>
                        </button>
                    </div>
                </div>
            </div>
            <!-- end item -->

        </main>


    </div>


    <!-- END MENU -->
</body>
</html>
